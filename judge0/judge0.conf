# Judge0 configuration (see https://github.com/judge0/judge0/blob/master/judge0.conf
# for every option). Sandbox hygiene: no callbacks out, tight per-run limits —
# grading policy (weights, marks) lives in the app, not here.

REDIS_HOST=redis
REDIS_PORT=6379

POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0-local-only

# Runners must not reach the network.
ENABLE_NETWORK=false
ALLOW_ENABLE_NETWORK=false

# Per-run ceilings (the app also passes per-submission limits).
CPU_TIME_LIMIT=5
MAX_CPU_TIME_LIMIT=10
MEMORY_LIMIT=256000
MAX_MEMORY_LIMIT=512000
MAX_QUEUE_SIZE=200

ENABLE_WAIT_RESULT=true
DISABLE_IMPLICIT_BASE64_ENCODING=false
